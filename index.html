<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Manajemen Tahfiz Bilal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --tema-warna: #fbbf24; --tema-gelap: #d97706; --teks-dalam-tombol: #451a03; --teks-utama: #f8fafc; --teks-sekunder: #94a3b8; --border-halus: rgba(255, 255, 255, 0.1); --bg-kaca: rgba(10, 17, 40, 0.5); --bg-elemen: rgba(255, 255, 255, 0.04); --bg-input: rgba(0, 0, 0, 0.4); --shadow-kaca: 0 25px 50px -12px rgba(0, 0, 0, 0.6); --warna-input-aktif: var(--tema-warna); --warna-input-bayangan: rgba(251, 191, 36, 0.2); }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: radial-gradient(circle at top center, #0a1128 0%, #020617 100%); background-attachment: fixed; background-size: cover; margin: 0; padding: 20px; color: var(--teks-utama); }
        .container { max-width: 650px; margin: 0 auto; background: var(--bg-kaca); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 35px 25px; border-radius: 28px; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: var(--shadow-kaca); }
        h2 { text-align: center; color: var(--tema-warna); font-weight: 800; margin-bottom: 25px; }
        .box { background: var(--bg-elemen); padding: 24px; border-radius: 20px; margin-bottom: 25px; border: 1px solid var(--border-halus); transition: all 0.3s ease; }
        input, select, textarea { width: 100%; padding: 14px 16px; margin: 8px 0; background: var(--bg-input); border: 1px solid var(--border-halus); border-radius: 12px; box-sizing: border-box; font-size: 15px; color: var(--teks-utama); outline: none; }
        button { width: 100%; background: linear-gradient(135deg, var(--tema-warna), var(--tema-gelap)); color: var(--teks-dalam-tombol); border: none; cursor: pointer; font-weight: 800; padding: 16px; border-radius: 14px; font-size: 16px; margin-top: 10px; box-shadow: 0 6px 0 #b45309; text-transform: uppercase; }
        .btn-outline { background: transparent; color: var(--tema-warna); border: 2px solid var(--tema-warna); box-shadow: none; }
        .btn-logout { background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; margin-top: 30px; box-shadow: 0 6px 0 #991b1b; }
        .hidden { display: none !important; }
        .list-container { margin-top:15px; max-height:280px; overflow-y:auto; border-top:1px solid var(--border-halus); padding-top:10px; }
        .list-item { display:flex; justify-content:space-between; align-items:center; background:var(--bg-input); padding:10px 15px; border-radius:10px; margin-bottom:8px; border:1px solid var(--border-halus); }
        .list-item-text { font-weight:700; font-size:14px; color:var(--teks-utama); }
        .btn-kecil { padding: 8px 12px; font-size: 13px; width: auto; margin: 0; border-radius: 8px; color: white; font-weight: bold; border:none; cursor:pointer; }
        .toggle-setoran { display: flex; background: rgba(0,0,0,0.5); border-radius: 12px; padding: 6px; margin-bottom: 20px; }
        .toggle-btn { flex: 1; padding: 12px; text-align: center; font-weight: 800; cursor: pointer; border-radius: 8px; color: var(--teks-sekunder); }
        .toggle-btn.aktif-ziyadah { background: linear-gradient(135deg, #fbbf24, #d97706); color: #451a03; }
        .toggle-btn.aktif-murojaah { background: linear-gradient(135deg, #10b981, #047857); color: white; }
        .grid-juz-surah { display: grid; grid-template-columns: 80px 1fr; gap: 12px; }
        .grid-ayat { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .rating-container { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--border-halus); }
        .rating { display: flex; flex-direction: row-reverse; }
        .rating input { display: none; }
        .rating label { font-size: 32px; color: rgba(255,255,255,0.15); cursor: pointer; margin: 0 4px; }
        .mode-z .rating input:checked ~ label { color: #fbbf24; } 
        .mode-m .rating input:checked ~ label { color: #10b981; } 
        .kontrol-tema-pill { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.3); padding: 5px 8px; border-radius: 100px; border: 1px solid var(--border-halus); }
        .btn-ikon-bulat { width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-size: 18px; position: relative; overflow: hidden; }
        .color-picker-hidden { position: absolute; top: -50px; left: -50px; width: 150px; height: 150px; opacity: 0; cursor: pointer; }
        @media (max-width: 500px) { .rating-container { flex-direction: column; align-items: flex-start; } .rating { width: 100%; justify-content: space-between; margin-top: 5px; } .btn-status-container { flex-direction: column; } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div class="logo-container"><img src="bilal.png" alt="Logo" class="splash-logo"></div>
            <h1 class="app-name-splash">Bilal Tahfizh</h1>
            <div class="loading-text" id="teks-loading">Memuat Server...</div>
        </div>
    </div>

    <div id="login-page" class="container hidden">
        <div class="box" style="text-align: center; border: none; background: transparent;">
            <img src="bilal.png" alt="Logo" style="width: 120px; animation: breathingLogo 3s infinite; margin-bottom:10px;">
            <h3 class="app-name-splash" style="font-size: 32px;">Portal Tahfizh</h3>
            <select id="select-muhaffiz"><option value="">-- Pilih Nama Antum --</option></select>
            <input type="password" id="sandi-muhaffiz" placeholder="Sandi Rahasia Anda..." style="text-align:center; letter-spacing:2px;">
            <button onclick="loginMuhaffiz()">Masuk Muhaffiz</button>
            <button onclick="bukaPortalOrtu()" class="btn-outline" style="margin-top:15px;">👨‍👩‍👧‍👦 Pantau Hafalan Anak</button>
        </div>
        <div class="admin-trigger" onclick="bukaModalAdminLogin()"><span>⚙️</span> Akses Admin</div>
    </div>

    <div id="modal-admin-login" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header"><h3>Otoritas Admin</h3></div>
            <input type="password" id="admin-password" placeholder="Sandi Admin...">
            <div class="btn-group">
                <button class="btn-batal" onclick="tutupModalAdminLogin()">Batal</button>
                <button onclick="loginAdmin()">Akses</button>
            </div>
        </div>
    </div>

    <div id="admin-page" class="container hidden">
        <h2>Dashboard Admin</h2>
        <div class="box">
            <h3>1. Kelola Guru</h3>
            <div style="display:flex; gap:10px;"><input type="text" id="inp-guru" placeholder="Nama Guru Baru..."><button onclick="adminAction('guru_add')" style="width:auto; margin:0;">➕</button></div>
            <div id="list-guru" class="list-container"></div>
        </div>
        <div class="box">
            <h3>2. Kelola Halaqah</h3>
            <div style="display:flex; gap:10px;"><input type="text" id="inp-halaqah" placeholder="Halaqah Baru..."><button onclick="adminAction('halaqah_add')" style="width:auto; margin:0;">➕</button></div>
            <div id="list-halaqah" class="list-container"></div>
        </div>
        <div class="box">
            <h3>3. Kelola Santri</h3>
            <select id="admin-pilih-halaqah" onchange="renderSantriAdmin()"></select>
            <textarea id="inp-santri" placeholder="Ketik nama santri (bisa masal pakai Enter)..."></textarea>
            <button onclick="adminAction('santri_add')">Tambah Santri</button>
            <div id="list-santri" class="list-container"></div>
        </div>
        <div class="box" style="border-left: 6px solid #10b981;">
            <h3 style="color:#10b981;">4. Import Excel Masal</h3>
            <button onclick="unduhTemplate()" class="btn-outline" style="border-color:#10b981; color:#10b981;">📥 Unduh Template</button>
            <input type="file" id="file-excel" accept=".xlsx" style="margin-top:15px;">
            <button onclick="prosesImport()" style="background:#10b981; color:white; box-shadow:0 6px 0 #059669;">🚀 Proses Import</button>
        </div>
        <div class="box"><h3>5. Laporan (LPJ)</h3><button onclick="bukaModalLaporan()">🖨️ Cetak Laporan</button></div>
        <button class="btn-logout" onclick="logout()">Keluar Admin</button>
    </div>

    <div id="ortu-page" class="container hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;"><h2>Portal Wali</h2><button class="btn-ikon-bulat" onclick="logout()">❌</button></div>
        <div class="box">
            <label>Pilih Halaqah:</label><select id="ortu-h" onchange="updateSantriOrtu()"></select>
            <label>Nama Anak:</label><select id="ortu-s" onchange="tampilkanOrtu()"><option value="">-- Pilih --</option></select>
            <div id="ortu-progres" class="kartu-prestasi"></div>
        </div>
        <div id="ortu-riwayat"></div>
    </div>

    <div id="muhaffiz-page" class="container hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Panel Muhaffiz</h2>
            <div class="kontrol-tema-pill">
                <button class="btn-ikon-bulat" onclick="bukaModalGantiSandi()">🔑</button>
                <label class="btn-ikon-bulat">🎨<input type="color" onchange="ubahTemaWarna(this.value)" class="color-picker-hidden"></label>
                <button class="btn-ikon-bulat" onclick="bukaModalWallpaper()">🖼️</button>
            </div>
        </div>
        <p style="text-align:center; font-weight:800; color:var(--tema-warna);" id="label-guru"></p>
        <div class="box">
            <select id="muhaffiz-h" onchange="updateSantriMuhaffiz()"></select>
            <select id="muhaffiz-s" onchange="tampilkanProgresMuhaffiz()"><option value="">-- Pilih Santri --</option></select>
            <div id="progres-m" class="kartu-prestasi"></div>
        </div>
        <div class="box mode-z" id="box-setoran">
            <div class="toggle-setoran"><div id="tz" class="toggle-btn aktif-ziyadah" onclick="setMode('Ziyadah')">⭐ ZIYADAH</div><div id="tm" class="toggle-btn" onclick="setMode('Murojaah')">🔄 MUROJA'AH</div></div>
            <div class="grid-juz-surah">
                <div><label class="form-label-small">Juz</label><input type="number" id="inp-juz"></div>
                <div><label class="form-label-small">Surah</label><select id="inp-surah" onchange="updAyt()"></select></div>
            </div>
            <div class="grid-ayat">
                <div><label class="form-label-small">Awal</label><select id="a-awal"></select></div>
                <div><label class="form-label-small">Akhir</label><select id="a-akhir"></select></div>
            </div>
            <div id="ratings"></div>
            <div class="btn-status-container" style="display:flex; gap:10px; margin-top:20px;">
                <button id="bL" class="btn-status btn-3d-active" onclick="setStatus('Lanjut')">✅ Lanjut</button>
                <button id="bU" class="btn-status btn-3d-inactive" onclick="setStatus('Ulangi')">🔄 Ulangi</button>
            </div>
            <textarea id="inp-catatan" placeholder="Catatan..."></textarea>
            <button id="btn-save" onclick="saveSetoran()">💾 SIMPAN DATA</button>
        </div>
        <div id="riwayat-m"></div>
        <button class="btn-logout" onclick="logout()">Keluar Aplikasi</button>
    </div>

    <div id="modal-laporan" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header"><h3>Cetak Laporan</h3><button class="close-btn" onclick="tutupModalLaporan()">×</button></div>
            <input type="date" id="lap-tgl"><input type="text" id="lap-pj" placeholder="Penanggung Jawab...">
            <select id="lap-jenis" onchange="aturLap()"><option value="semua">Semua</option><option value="halaqah">Per Halaqah</option><option value="santri">Per Santri</option></select>
            <div id="lap-h-div" class="hidden"><select id="lap-h" onchange="updLapS()"></select></div>
            <div id="lap-s-div" class="hidden"><select id="lap-s"></select></div>
            <div class="btn-group">
                <button onclick="prosesCetak('PDF')" style="background:#ef4444; color:white;">PDF</button>
                <button onclick="prosesCetak('Excel')">EXCEL</button>
            </div>
        </div>
    </div>

    <script>
        // --- ⚠️ MASUKKAN URL SCRIPT ANTUM ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxoNJfz3VozPWYHaRn-Q0WVL5d284j3_Q8LpzprKnpiP0NTaCltDclmGrmpNbHAbRBH/exec';

        const dataSurah = {"Al-Fatihah":7,"Al-Baqarah":286,"Ali 'Imran":200,"An-Nisa'":176,"Al-Ma'idah":120,"Al-An'am":165,"Al-A'raf":206,"Al-Anfal":75,"At-Taubah":129,"Yunus":109,"Hud":123,"Yusuf":111,"Ar-Ra'd":43,"Ibrahim":52,"Al-Hijr":99,"An-Nahl":128,"Al-Isra'":111,"Al-Kahf":110,"Maryam":98,"Taha":135,"Al-Anbiya'":112,"Al-Hajj":78,"Al-Mu'minun":118,"An-Nur":64,"Al-Furqan":77,"Asy-Syu'ara'":227,"An-Naml":93,"Al-Qasas":88,"Al-'Ankabut":69,"Ar-Rum":60,"Luqman":34,"As-Sajdah":30,"Al-Ahzab":73,"Saba'":54,"Fatir":45,"Yasin":83,"As-Saffat":182,"Sad":88,"Az-Zumar":75,"Gafir":85,"Fussilat":54,"Asy-Syura":53,"Az-Zukhruf":89,"Ad-Dukhan":59,"Al-Jasiyah":37,"Al-Ahqaf":35,"Muhammad":38,"Al-Fath":29,"Al-Hujurat":18,"Qaf":45,"Az-Zariyat":60,"At-Tur":49,"An-Najm":62,"Al-Qamar":55,"Ar-Rahman":78,"Al-Waqi'ah":96,"Al-Hadid":29,"Al-Mujadilah":22,"Al-Hasyr":24,"Al-Mumtahanah":13,"As-Saff":14,"Al-Jumu'ah":11,"Al-Munafiqun":11,"At-Tagabun":18,"At-Talaq":12,"At-Tahrim":12,"Al-Mulk":30,"Al-Qalam":52,"Al-Haqqah":52,"Al-Ma'arij":44,"Nuh":28,"Al-Jinn":28,"Al-Muzzammil":20,"Al-Muddassir":56,"Al-Qiyamah":40,"Al-Insan":31,"Al-Mursalat":50,"An-Naba'":40,"An-Nazi'at":46,"'Abasa":42,"At-Takwir":29,"Al-Infitar":19,"Al-Mutaffifin":36,"Al-Insyiqaq":25,"Al-Buruj":22,"At-Tariq":17,"Al-A'la":19,"Al-Gasyiyah":26,"Al-Fajr":30,"Al-Balad":20,"Asy-Syams":15,"Al-Lail":21,"Ad-Duha":11,"Asy-Syarh":8,"At-Tin":8,"Al-'Alaq":19,"Al-Qadr":5,"Al-Bayyinah":8,"Az-Zalzalah":8,"Al-'Adiyat":11,"Al-Qari'ah":11,"At-Takasur":8,"Al-'Asr":3,"Al-Humazah":9,"Al-Fil":5,"Quraisy":4,"Al-Ma'un":7,"Al-Kausar":3,"Al-Kafirun":6,"An-Nasr":3,"Al-Lahab":5,"Al-Ikhlas":4,"Al-Falaq":5,"An-Nas":6};
        
        let dbP = {}; let dProg = {}; let dRiw = []; let dAkun = {}; let guruLog = ""; let modeLog = "Ziyadah"; let statLog = "Lanjut";

        window.onload = () => {
            let s = document.getElementById('inp-surah'); s.innerHTML = '<option value="">-- Surah --</option>';
            for(let k in dataSurah) s.appendChild(new Option(k, k));
            ['tajwid', 'lancar', 'makhraj'].forEach(id => {
                let h = `<div class="rating-container"><span class="rating-label">${id.toUpperCase()}</span><div class="rating">`;
                for(let i=5; i>=1; i--) h += `<input type="radio" id="st${i}${id}" name="${id}" value="${i}"><label for="st${i}${id}">★</label>`;
                document.getElementById('ratings').innerHTML += h + '</div></div>';
            });
            tarikDataServer();
        };

        function tarikDataServer(asal) {
            fetch(scriptURL).then(r => r.json()).then(d => {
                dProg = d.progres; dRiw = d.riwayat; dAkun = d.akun;
                dbP = {}; (d.halaqah || []).forEach(h => dbP[h] = []);
                (d.santri || []).forEach(s => { if(dbP[s.halaqah]) dbP[s.halaqah].push(s.nama); });
                renderLogins(); 
                if(asal === 'admin') renderTabelAdmin();
            });
        }

        function renderLogins() {
            let s = document.getElementById('select-muhaffiz'); s.innerHTML = '<option value="">-- Pilih Muhaffiz --</option>';
            for(let n in dAkun) s.appendChild(new Option(n, n));
        }

        function loginMuhaffiz() {
            let n = document.getElementById('select-muhaffiz').value, p = document.getElementById('sandi-muhaffiz').value;
            if(!n) return alert("Pilih nama!"); if(p !== (dAkun[n] || "guru123")) return alert("Sandi salah!");
            guruLog = n; document.getElementById('login-page').classList.add('hidden'); document.getElementById('muhaffiz-page').classList.remove('hidden');
            document.getElementById('label-guru').innerText = "👤 " + n;
            renderHalaqahDropdowns();
        }

        function renderHalaqahDropdowns() {
            ['muhaffiz-h', 'ortu-h', 'admin-pilih-halaqah', 'lap-h'].forEach(id => {
                let s = document.getElementById(id); s.innerHTML = '<option value="">-- Pilih Halaqah --</option>';
                for(let h in dbP) s.appendChild(new Option(h, h));
            });
        }

        // --- CRUD ADMIN ---
        function adminAction(act, id, sh) {
            let payload = { action: "", sheetName: sh || "", id_lama: id || "" };
            if(act === 'guru_add') {
                let n = document.getElementById('inp-guru').value.trim(); if(!n) return;
                payload.action = "crud_tambah"; payload.sheetName = "Akun"; payload.rowData = [n, "guru123"];
            } else if(act === 'halaqah_add') {
                let n = document.getElementById('inp-halaqah').value.trim(); if(!n) return;
                payload.action = "crud_tambah"; payload.sheetName = "Halaqah"; payload.rowData = [n];
            } else if(act === 'santri_add') {
                let h = document.getElementById('admin-pilih-halaqah').value, d = document.getElementById('inp-santri').value.trim();
                if(!h || !d) return;
                payload.action = "crud_tambah_batch"; payload.sheetName = "Santri"; 
                payload.rowsData = d.split('\n').map(n => [h, n.trim()]);
            }
            fetch(scriptURL, {method:'POST', mode:'no-cors', body: JSON.stringify(payload)}).then(() => { alert("Berhasil!"); tarikDataServer('admin'); });
        }

        function renderTabelAdmin() {
            let hGuru = '', hHal = '';
            for(let n in dAkun) hGuru += itemAdmin(n, 'Akun');
            for(let h in dbP) hHal += itemAdmin(h, 'Halaqah');
            document.getElementById('list-guru').innerHTML = hGuru; document.getElementById('list-halaqah').innerHTML = hHal;
            renderSantriAdmin();
        }

        function itemAdmin(txt, sh, h) {
            return `<div class="list-item"><span>${txt}</span><div><button onclick="hapusMaster('${txt}','${sh}')" class="btn-kecil" style="background:#ef4444;">🗑️</button></div></div>`;
        }

        function hapusMaster(id, sh) { if(confirm("Hapus?")) { fetch(scriptURL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:"crud_hapus", sheetName:sh, id_lama:id})}).then(()=>tarikDataServer('admin')); } }

        function renderSantriAdmin() {
            let h = document.getElementById('admin-pilih-halaqah').value, html = '';
            if(!h) return;
            (dbP[h] || []).forEach(s => {
                html += `<div class="list-item"><span>${s}</span><button onclick="hapusMaster('${h}_${s}','Santri')" class="btn-kecil" style="background:#ef4444;">🗑️</button></div>`;
            });
            document.getElementById('list-santri').innerHTML = html;
        }

        // --- IMPORT EXCEL ---
        function prosesImport() {
            let f = document.getElementById('file-excel').files[0]; if(!f) return;
            let r = new FileReader(); r.onload = (e) => {
                let wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                let dG = [], dS = [];
                if(wb.Sheets["Guru"]) dG = XLSX.utils.sheet_to_json(wb.Sheets["Guru"], {header:1}).slice(1);
                if(wb.Sheets["Santri"]) dS = XLSX.utils.sheet_to_json(wb.Sheets["Santri"], {header:1}).slice(1);
                fetch(scriptURL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:"import_excel", guru:dG, santri:dS})}).then(()=>tarikDataServer('admin'));
            }; r.readAsArrayBuffer(f);
        }

        // --- MUHAFFIZ CORE ---
        function updateSantriMuhaffiz() {
            let h = document.getElementById('muhaffiz-h').value, s = document.getElementById('muhaffiz-s');
            s.innerHTML = '<option value="">-- Pilih Santri --</option>';
            (dbP[h] || []).forEach(n => s.appendChild(new Option(n, n)));
        }

        function setMode(m) {
            modeLog = m; 
            document.getElementById('tz').className = m === 'Ziyadah' ? 'toggle-btn aktif-ziyadah' : 'toggle-btn';
            document.getElementById('tm').className = m === 'Murojaah' ? 'toggle-btn aktif-murojaah' : 'toggle-btn';
            document.documentElement.style.setProperty('--warna-input-aktif', m==='Ziyadah'?'#fbbf24':'#10b981');
            document.getElementById('btn-save').innerText = "💾 SIMPAN " + m.toUpperCase();
        }

        function updAyt() {
            let s = document.getElementById('inp-surah').value, a = document.getElementById('a-awal'), b = document.getElementById('a-akhir');
            a.innerHTML = b.innerHTML = '<option value="">-</option>';
            if(s) for(let i=1; i<=dataSurah[s]; i++) { a.appendChild(new Option(i,i)); b.appendChild(new Option(i,i)); }
        }

        function saveSetoran() {
            let h = document.getElementById('muhaffiz-h').value, s = document.getElementById('muhaffiz-s').value, juz = document.getElementById('inp-juz').value, sur = document.getElementById('inp-surah').value, a = document.getElementById('a-awal').value, b = document.getElementById('a-akhir').value;
            if(!h || !s || !juz || !sur || !a || !b) return alert("Lengkapi!");
            let pay = { tgl: new Date().toLocaleString('id-ID'), halaqah:h, santri:s, kehadiran:"Hadir", jenis:modeLog, juz:juz, surah:sur, ayat:a+"-"+b, tajwid:getV('tajwid'), lancar:getV('lancar'), makhraj:getV('makhraj'), status:statLog, catatan:document.getElementById('inp-catatan').value };
            fetch(scriptURL, {method:'POST', mode:'no-cors', body:JSON.stringify(pay)}).then(() => { alert("Tersimpan!"); location.reload(); });
        }
        function getV(n){ let r = document.querySelector(`input[name="${n}"]:checked`); return r?r.value:"3"; }

        // --- SPLASH & OTHER ---
        function logout() { location.reload(); }
        function setWallpaper(b) { document.body.style.background = b; document.body.style.backgroundSize = "cover"; }
        function unduhTemplate() {
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["Nama","Sandi"],["Ustadz Ahmad","guru123"]]), "Guru");
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["Halaqah","Nama Santri"],["Halaqah A","Zaid"]]), "Santri");
            XLSX.writeFile(wb, "Template_Bilal.xlsx");
        }
        
        // LAPORAN PDF/EXCEL FIXED
        function prosesCetak(tipe) {
            const { jsPDF } = window.jspdf;
            let j = document.getElementById('lap-jenis').value, th = document.getElementById('lap-h').value, ts = document.getElementById('lap-s').value;
            let data = dRiw.filter(i => (j==='halaqah'?i.halaqah===th : j==='santri'?(i.halaqah===th&&i.santri===ts):true));
            if(data.length === 0) return alert("Kosong!");

            let head = [["No","Waktu","Nama","Hadir","Jenis","Juz","Surah","Ayat","T","L","M","Status"]];
            let body = data.map((i, idx) => [idx+1, i.tgl, i.santri, i.kehadiran, i.jenis, i.juz, i.surah, i.ayat, i.tajwid, i.lancar, i.makhraj, i.status]);

            if(tipe === 'Excel') {
                let wb = XLSX.utils.book_new(), ws = XLSX.utils.aoa_to_sheet([...head, ...body]);
                XLSX.utils.book_append_sheet(wb, ws, "Laporan"); XLSX.writeFile(wb, "Laporan_Tahfiz.xlsx");
            } else {
                let doc = new jsPDF('l'); doc.text("Laporan Tahfiz Bilal", 14, 15);
                doc.autoTable({ head: head, body: body, startY: 20, theme: 'grid', headStyles: {fillColor:[217, 119, 6]} });
                doc.save("Laporan_Tahfiz.pdf");
            }
        }
        
        function drawStars(n) { let s = parseInt(n) || 0; return "★".repeat(s) + "☆".repeat(5-s); }
        function setStatus(s) { statLog = s; document.getElementById('bL').className = s==='Lanjut'?'btn-status btn-3d-active':'btn-status btn-3d-inactive'; document.getElementById('bU').className = s==='Ulangi'?'btn-status btn-3d-active-danger':'btn-status btn-3d-inactive'; }
        function bukaPortalOrtu() { document.getElementById('login-page').classList.add('hidden'); document.getElementById('ortu-page').classList.remove('hidden'); renderHalaqahDropdowns(); }
        function updateSantriOrtu() { let h = document.getElementById('ortu-h').value, s = document.getElementById('ortu-s'); s.innerHTML='<option value="">-- Pilih --</option>'; (dbP[h]||[]).forEach(n => s.appendChild(new Option(n,n))); }
        function tampilkanOrtu() {
            let s = document.getElementById('ortu-s').value, p = dProg[s], h = '';
            document.getElementById('ortu-progres').style.display = s ? 'block' : 'none';
            if(p) { document.getElementById('ortu-infoJuz').innerText = p.juz + " Juz"; document.getElementById('ortu-infoSurah').innerText = p.surah + " (" + p.ayat + ")"; }
            dRiw.filter(i => i.santri === s).forEach(i => {
                h += `<div class="kartu-riwayat" style="border-left-color:${i.status==='Lanjut'?'#fbbf24':'#ef4444'}"><p><b>${i.tgl}</b> [${i.jenis}]</p><p>📖 Juz ${i.juz} - ${i.surah}:${i.ayat}</p><p>${drawStars(i.tajwid)} | ${drawStars(i.lancar)} | ${drawStars(i.makhraj)}</p></div>`;
            });
            document.getElementById('ortu-riwayat').innerHTML = h;
        }
        function toggleFormSetoran() { let h = document.querySelector('input[name="kehadiran"]:checked').value !== "Hadir"; document.getElementById('area-form-setoran').style.opacity = h ? "0.3" : "1"; document.getElementById('area-form-setoran').style.pointerEvents = h ? "none" : "auto"; }
        function bukaModalAdminLogin() { document.getElementById('modal-admin-login').classList.remove('hidden'); }
        function tutupModalAdminLogin() { document.getElementById('modal-admin-login').classList.add('hidden'); }
        function loginAdmin() { if(document.getElementById('admin-password').value === 'admin123') { tutupModalAdminLogin(); document.getElementById('login-page').classList.add('hidden'); document.getElementById('admin-page').classList.remove('hidden'); renderTabelAdmin(); } }
        function bukaModalLaporan() { document.getElementById('modal-laporan').classList.remove('hidden'); }
        function tutupModalLaporan() { document.getElementById('modal-laporan').classList.add('hidden'); }
        function aturLap() { let v = document.getElementById('lap-jenis').value; document.getElementById('lap-h-div').className = v==='halaqah'||v==='santri'?'':'hidden'; document.getElementById('lap-s-div').className = v==='santri'?'':'hidden'; }
        function updLapS() { let h = document.getElementById('lap-h').value, s = document.getElementById('lap-s'); s.innerHTML=''; (dbP[h]||[]).forEach(n => s.appendChild(new Option(n,n))); }
        function bukaModalGantiSandi() { document.getElementById('modal-ganti-sandi').classList.remove('hidden'); }
        function tutupModalGantiSandi() { document.getElementById('modal-ganti-sandi').classList.add('hidden'); }
        function bukaModalWallpaper() { document.getElementById('modal-wallpaper').classList.remove('hidden'); }
        function tutupModalWallpaper() { document.getElementById('modal-wallpaper').classList.add('hidden'); }
    </script>
</body>
</html>
